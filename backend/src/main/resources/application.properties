spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/explore_game}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gameuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gamepass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.forward-headers-strategy=framework

cors.allowed-origins=http://localhost:3001

server.port=${PORT:8080}